name: Morgen Nyheder Bot

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Opsaet Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer afhaengigheder
        run: pip install feedparser google-genai requests

      - name: Koer nyhedsbot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python news_bot.py
